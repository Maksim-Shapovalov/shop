services:
  pg-database:
    image: postgres:17
    container_name: shop-db
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_HOST=${DATABASE_HOST}
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - shop-db-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: shop-rabbitmq
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
    env_file:
      - .env
    ports:
      - 5672:5672
      - 15672:15672

  redis-shop-cache:
    image: redis:latest
    container_name: shop-cache
    env_file:
      - .env
    ports:
      - 6379:6379
    volumes:
      - shop-redis-data:/data
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']

volumes:
  shop-db-data:
  shop-redis-data:

